<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/responsive.css">

    <title>Fundo Mágico</title>
</head>
<body>
    <header class="header">
        <h1>Fundo Mágico</h1>
        <p class="subtitle">Transforme suas ideias em backgrounds incríveis com o poder da IA. Descreva o que você imagina e deixe a magia acontecer.</p>
    </header>
    <main class="container">
        <section class="card main-card">
            <h2 class="card-header">Descreva o background que você deseja</h2>
            <form class="form-group">
                <textarea id="description" placeholder="Ex: um gradiente azul suave que vai do azul claro ao azul escuro" rows="5"></textarea>
                <button id="generate-btn" class="btn-magic">
                    <span id="btn-text">Gerar Background</span>
                </button>
            </form>
        </section>

        <section class="preview-card" id="preview-section"></section>

        <section class="code-grid" id="code-output">
            <div class="card code-card">
                <h3 class="code-title">Código HTML</h3>
                <pre id="html-code" class="code-block"></pre>
            </div>
            <div class="card code-card">
                <h3 class="code-title">Código CSS</h3>
                <pre id="css-code" class="code-block"></pre>
            </div>
        </section>
    </main>
    <script src="./src/js/index.js"></script>
</body>
</html>
